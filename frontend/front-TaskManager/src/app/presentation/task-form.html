<div class="form-overlay" (click)="onCancel()">
  <div class="form-card" (click)="$event.stopPropagation()">
    <h2>{{ task ? 'Editar tarefa' : 'Nova tarefa' }}</h2>

    <div class="field">
      <label for="title">Título *</label>
      <input
        id="title"
        type="text"
        [(ngModel)]="title"
        placeholder="O que precisa ser feito?"
        maxlength="200"
        autofocus
      />
      <span class="char-count">{{ title().length }}/200</span>
    </div>

    <div class="field">
      <label for="desc">Descrição</label>
      <textarea
        id="desc"
        [(ngModel)]="description"
        placeholder="Detalhes opcionais..."
        maxlength="2000"
        rows="3"
      ></textarea>
    </div>

    @if (task) {
      <div class="field">
        <label for="status">Status</label>
        <select id="status" [(ngModel)]="selectedStatus">
          @for (opt of statusOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </select>
      </div>
    }

    <div class="actions">
      <button class="btn-secondary" (click)="onCancel()">Cancelar</button>
      <button
        class="btn-primary"
        [disabled]="!title().trim()"
        (click)="onSubmit()"
      >
        {{ task ? 'Salvar' : 'Criar' }}
      </button>
    </div>
  </div>
</div>
